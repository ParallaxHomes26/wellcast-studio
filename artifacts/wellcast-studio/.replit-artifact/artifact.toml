kind = "web"
previewPath = "/"
title = "Wellcast Studio"
version = "1.0.0"
id = "artifacts/wellcast-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19976

[services.development]
run = "pnpm --filter @workspace/wellcast-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wellcast-studio", "run", "build" ]
publicDir = "artifacts/wellcast-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19976"
BASE_PATH = "/"
